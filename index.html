<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    />
    <link rel="shortcut icon" href="img/icono2.png" type="image/x-icon" />
    <title>en_deriva</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="page-perspective">
      <div id="page">
        <span id="committed" contenteditable="false"></span
        ><span id="editor" contenteditable="true" spellcheck="false"></span>
      </div>
    </div>

    <div id="status"></div>

    <div id="btn-hint">
      <span id="btn-hint-text"></span>
    </div>

    <div id="btn-mini-bubble" aria-label="Ir al área de escritura">
      <textarea
        id="btn-mini-input"
        rows="1"
        spellcheck="false"
        placeholder="Escribí algo.."
        aria-label="Escribí algo"
      ></textarea>
    </div>

    <canvas id="btn-canvas" width="120" height="120"></canvas>

    <script type="module" src="app.js"></script>
  </body>
</html>
